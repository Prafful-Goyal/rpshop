[build]
publish = "public"
functions = "netlify/functions"

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/admin"
to = "/admin.html"
status = 200

[[redirects]]
from = "/shop"
to = "/shop.html"
status = 200

[[redirects]]
from = "/cart"
to = "/cart.html"
status = 200

[[redirects]]
from = "/checkout"
to = "/checkout.html"
status = 200
